<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – HC Financial</title>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1565C0 0%, #0D47A1 40%, #01579B 100%);
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      margin: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }

    /* ── Logo / Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1565C0, #0D47A1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(21, 101, 192, 0.4);
    }
    .logo-circle svg { width: 36px; height: 36px; fill: #fff; }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0D47A1;
      letter-spacing: -0.3px;
    }
    .header p {
      margin-top: 6px;
      font-size: 13px;
      color: #78909C;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #37474F;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 13px 44px 13px 14px;
      border: 1.5px solid #CFD8DC;
      border-radius: 10px;
      font-size: 15px;
      color: #263238;
      background: #FAFAFA;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: #1565C0;
      box-shadow: 0 0 0 3px rgba(21,101,192,.12);
      background: #fff;
    }
    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #90A4AE;
      display: flex;
      align-items: center;
    }
    .toggle-btn:hover { color: #1565C0; }
    .toggle-btn svg { width: 20px; height: 20px; }

    /* password strength bar */
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: #ECEFF1;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width .3s, background .3s;
    }
    .strength-label {
      font-size: 11px;
      margin-top: 4px;
      color: #90A4AE;
      min-height: 14px;
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: linear-gradient(135deg, #1565C0, #0D47A1);
      color: #fff;
      box-shadow: 0 6px 20px rgba(21,101,192,.35);
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-secondary {
      background: #E3F2FD;
      color: #1565C0;
      margin-top: 12px;
    }
    .btn-secondary:hover { background: #BBDEFB; }

    /* spinner inside button */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alert ── */
    .alert {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 20px;
      display: none;
    }
    .alert.show { display: flex; align-items: flex-start; gap: 10px; }
    .alert-error { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }
    .alert-success { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }
    .alert svg { flex-shrink: 0; width: 18px; height: 18px; margin-top: 1px; }

    /* ── State panels ── */
    #panel-loading, #panel-form, #panel-success, #panel-invalid { display: none; }
    #panel-loading.active, #panel-form.active, #panel-success.active, #panel-invalid.active { display: block; }

    /* loading skeleton */
    #panel-loading { text-align: center; padding: 20px 0; color: #90A4AE; font-size: 14px; }
    .loader {
      width: 40px; height: 40px;
      border: 3px solid #E3F2FD;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }

    /* success panel */
    #panel-success { text-align: center; }
    .success-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #43A047, #2E7D32);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(46,125,50,.3);
    }
    .success-icon svg { width: 40px; height: 40px; fill: #fff; }
    #panel-success h2 { font-size: 20px; color: #2E7D32; margin-bottom: 8px; }
    #panel-success p { font-size: 14px; color: #78909C; line-height: 1.6; }

    /* invalid panel */
    #panel-invalid { text-align: center; }
    .invalid-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #EF5350, #C62828);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(198,40,40,.3);
    }
    .invalid-icon svg { width: 40px; height: 40px; fill: #fff; }
    #panel-invalid h2 { font-size: 20px; color: #C62828; margin-bottom: 8px; }
    #panel-invalid p { font-size: 14px; color: #78909C; line-height: 1.6; }

    .divider {
      border: none;
      border-top: 1px solid #ECEFF1;
      margin: 24px 0 16px;
    }
    .back-link {
      display: block;
      text-align: center;
      font-size: 13px;
      color: #90A4AE;
      margin-top: 20px;
      text-decoration: none;
    }
    .back-link:hover { color: #1565C0; }
  </style>
</head>
<body>
<div class="card">

  <!-- ── Logo ── -->
  <div class="header">
    <div class="logo-circle">
      <!-- Finance / wallet icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 18v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v1h-9a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
      </svg>
    </div>
    <h1>HC Financial</h1>
    <p>Secure Password Reset</p>
  </div>

  <!-- ── Loading ── -->
  <div id="panel-loading" class="active">
    <div class="loader"></div>
    <p>Verifying your reset link…</p>
  </div>

  <!-- ── Form ── -->
  <div id="panel-form">
    <div id="alert-error" class="alert alert-error">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="alert-error-text"></span>
    </div>

    <form id="reset-form" novalidate>
      <div class="form-group">
        <label for="new-password">New Password</label>
        <div class="input-wrap">
          <input type="password" id="new-password" placeholder="Enter new password" autocomplete="new-password" />
          <button type="button" class="toggle-btn" onclick="toggleVisibility('new-password', this)" aria-label="Show password">
            <svg id="eye-new" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm-password" placeholder="Re-enter new password" autocomplete="new-password" />
          <button type="button" class="toggle-btn" onclick="toggleVisibility('confirm-password', this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn">
        Reset Password
      </button>
    </form>
  </div>

  <!-- ── Success ── -->
  <div id="panel-success">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    </div>
    <h2>Password Updated!</h2>
    <p>Your password has been reset successfully.<br>You can now sign in with your new password.</p>
    <hr class="divider" />
    <a href="/" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;padding:14px;">
      Back to App
    </a>
  </div>

  <!-- ── Invalid / Expired ── -->
  <div id="panel-invalid">
    <div class="invalid-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
    </div>
    <h2 id="invalid-title">Link Expired</h2>
    <p id="invalid-msg">This password reset link has expired or already been used. Please request a new one.</p>
    <hr class="divider" />
    <a href="/" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;padding:14px;">
      Back to App
    </a>
  </div>

</div>

<script>
  // ── Firebase init ──
  firebase.initializeApp({
    apiKey: "AIzaSyBCMz7x47_ezSp33b7BTeeST-N5b2DKpYk",
    authDomain: "hc-petty-cash-report.firebaseapp.com",
    projectId: "hc-petty-cash-report",
  });
  const auth = firebase.auth();

  // ── Read query params ──
  const params  = new URLSearchParams(window.location.search);
  const mode    = params.get('mode');
  const oobCode = params.get('oobCode');

  // ── Panel helpers ──
  function showPanel(id) {
    ['panel-loading','panel-form','panel-success','panel-invalid'].forEach(p => {
      document.getElementById(p).classList.toggle('active', p === id);
    });
  }

  function showError(msg) {
    const el = document.getElementById('alert-error');
    document.getElementById('alert-error-text').textContent = msg;
    el.classList.add('show');
  }
  function hideError() {
    document.getElementById('alert-error').classList.remove('show');
  }

  // ── Password visibility toggle ──
  function toggleVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    // swap icon
    btn.querySelector('svg').innerHTML = isHidden
      ? '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>'
      : '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
  }

  // ── Password strength ──
  document.getElementById('new-password').addEventListener('input', function() {
    const val  = this.value;
    const fill = document.getElementById('strength-fill');
    const lbl  = document.getElementById('strength-label');
    let score  = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { pct: '0%',   color: '#ECEFF1', text: '' },
      { pct: '25%',  color: '#EF5350', text: 'Weak' },
      { pct: '50%',  color: '#FFA726', text: 'Fair' },
      { pct: '75%',  color: '#29B6F6', text: 'Good' },
      { pct: '100%', color: '#66BB6A', text: 'Strong' },
    ];
    fill.style.width      = levels[score].pct;
    fill.style.background = levels[score].color;
    lbl.textContent       = levels[score].text;
    lbl.style.color       = levels[score].color;
  });

  // ── Verify oobCode on load ──
  if (mode !== 'resetPassword' || !oobCode) {
    document.getElementById('invalid-title').textContent = 'Invalid Link';
    document.getElementById('invalid-msg').textContent   = 'This link is invalid or missing required parameters. Please request a new password reset.';
    showPanel('panel-invalid');
  } else {
    auth.verifyPasswordResetCode(oobCode)
      .then(() => showPanel('panel-form'))
      .catch(() => showPanel('panel-invalid'));
  }

  // ── Form submit ──
  document.getElementById('reset-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideError();

    const newPw  = document.getElementById('new-password').value;
    const confPw = document.getElementById('confirm-password').value;
    const btn    = document.getElementById('submit-btn');

    if (newPw.length < 8) {
      return showError('Password must be at least 8 characters.');
    }
    if (newPw !== confPw) {
      return showError('Passwords do not match.');
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Resetting…';

    try {
      await auth.confirmPasswordReset(oobCode, newPw);
      showPanel('panel-success');
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Reset Password';
      const messages = {
        'auth/expired-action-code': 'This reset link has expired. Please request a new one.',
        'auth/invalid-action-code': 'This reset link is invalid or has already been used.',
        'auth/weak-password':       'Password is too weak. Please choose a stronger password.',
        'auth/user-not-found':      'No account found for this reset link.',
      };
      showError(messages[err.code] || 'Something went wrong. Please try again.');
    }
  });
</script>
</body>
</html>
